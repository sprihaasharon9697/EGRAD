<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Grad | Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="register-bg">

<header><h2>E-Grad</h2></header>

<div class="container">
    <h2>Register</h2>

    <input type="text" id="regName" placeholder="Full Name">
    <input type="text" id="regSic" placeholder="SIC (Ex: 34XYZP89)">
    <input type="text" id="regPhone" placeholder="Phone Number">
    <input type="text" id="regBranch" placeholder="Branch">
    <input type="email" id="regMail" placeholder="Gmail">
    <input type="password" id="regPass" placeholder="Password">

    <button class="submit-btn" onclick="saveUser()">Register</button>

    <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script src="script.js"></script>
</body>
</html>
