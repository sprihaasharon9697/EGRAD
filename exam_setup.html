<!DOCTYPE html>
<html>
<head>
<title>Exam Setup</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<header><h2>E-Grad</h2></header>

<div class="container">
    <h2>Exam Setup</h2>

    <input type="text" id="vName" placeholder="Name">
    <input type="text" id="vSic" placeholder="SIC">
    <input type="text" id="vRoll" placeholder="Roll No">
    <input type="text" id="vBranch" placeholder="Branch">

    <select id="subject">
        <option value="">Select Subject</option>
        <option value="OS">Operating Systems</option>
        <option value="DBMS">DBMS</option>
        <option value="TOC">TOC</option>
    </select>

    <button class="submit-btn" onclick="startExam()">Start Exam</button>
</div>

<script src="script.js"></script>
</body>
</html>
